apiVersion: testworkflows.testkube.io/v1
kind: TestWorkflow
metadata:
  name: database-health-check
  labels:
    marketplace.testkube.io/category: databases
    marketplace.testkube.io/component: generic
    marketplace.testkube.io/validation-type: health
  annotations:
    marketplace.testkube.io/display-name: "Generic Database Health Check"
    marketplace.testkube.io/description: "Checks database-like pods for running phase in selected namespaces"
    marketplace.testkube.io/icon: "https://cdn.simpleicons.org/databricks"
    marketplace.testkube.io/tags: "kubernetes,database,health,postgres,mysql,mongo,redis"
spec:
  config:
    target_namespaces:
      type: string
      default: "default"
      description: "Comma-separated namespaces to validate"
    db_name_pattern:
      type: string
      default: "postgres|mysql|mariadb|mongo|redis|cockroach|db"
      description: "Regex used to identify database pod names"
  steps:
    - name: "Validate Database Health"
      run:
        image: docker.io/library/alpine:3.20@sha256:a4f4213abb84c497377b8544c81b3564f313746700372ec4fe84653e4fb03805
        env:
          - name: TARGET_NAMESPACES
            value: "{{ config.target_namespaces }}"
          - name: DB_NAME_PATTERN
            value: "{{ config.db_name_pattern }}"
        shell: |
          set -eu
          apk add --no-cache kubectl >/dev/null
          failed=0
          found=0

          IFS=','
          for ns in $TARGET_NAMESPACES; do
            ns_trimmed="$(echo "$ns" | xargs)"
            echo "Checking database-like pods in namespace: $ns_trimmed"
            kubectl get pods -n "$ns_trimmed" >/dev/null 2>&1 || continue

            db_pods="$(kubectl get pods -n "$ns_trimmed" --no-headers | grep -E -i "$DB_NAME_PATTERN" || true)"
            [ -n "$db_pods" ] || continue
            found=1

            invalid="$(echo "$db_pods" | awk '$3!="Running" && $3!="Completed" {print $1, $3}')"
            if [ -n "$invalid" ]; then
              echo "FAIL: Invalid database pod status:"
              echo "$invalid"
              failed=1
            fi
          done

          [ "$found" -eq 1 ] || echo "WARN: No database-like pods matched pattern."
          [ "$failed" -eq 0 ] || exit 1
          echo "Database validation passed."
